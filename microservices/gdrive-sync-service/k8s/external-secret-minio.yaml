# Same Vault path as rtsp-to-hls / train MinIO credentials (secret/chessverse/minio).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gdrive-sync-minio-credentials
  namespace: chessverse
  labels:
    app.kubernetes.io/name: gdrive-sync
    app.kubernetes.io/part-of: chessverse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gdrive-sync-minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: chessverse/minio
        property: access_key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: chessverse/minio
        property: secret_key
