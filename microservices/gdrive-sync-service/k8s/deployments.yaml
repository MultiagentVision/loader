apiVersion: apps/v1
kind: Deployment
metadata:
  name: chessverse-gdrive-sync-api
  namespace: chessverse
  labels:
    app: gdrive-sync-api
    app.kubernetes.io/name: gdrive-sync-api
    app.kubernetes.io/part-of: chessverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdrive-sync-api
  template:
    metadata:
      labels:
        app: gdrive-sync-api
        app.kubernetes.io/name: gdrive-sync-api
    spec:
      imagePullSecrets:
        - name: harbor-pull
      volumes:
        - name: drives-config
          configMap:
            name: gdrive-sync-drives
        - name: drive-sa
          secret:
            secretName: gdrive-sync-drive-sa
      initContainers:
        - name: alembic-upgrade
          image: registry.multiagent.vision/chessverse/gdrive_sync:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DRIVES_CONFIG_PATH
              value: /config/drives.yaml
            - name: MINIO_BUCKET
              value: chess-ai
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: gdrive-sync-minio-credentials
            - secretRef:
                name: gdrive-sync-env
      containers:
        - name: api
          image: registry.multiagent.vision/chessverse/gdrive_sync:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DRIVES_CONFIG_PATH
              value: /config/drives.yaml
            - name: MINIO_BUCKET
              value: chess-ai
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: gdrive-sync-minio-credentials
            - secretRef:
                name: gdrive-sync-env
          volumeMounts:
            - name: drives-config
              mountPath: /config
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/rehovot-drive-sa.json
              subPath: rehovot-drive-sa.json
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/beer-sheva-drive-sa.json
              subPath: beer-sheva-drive-sa.json
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/ramat-gan-drive-sa.json
              subPath: ramat-gan-drive-sa.json
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chessverse-gdrive-sync-worker
  namespace: chessverse
  labels:
    app: gdrive-sync-worker
    app.kubernetes.io/name: gdrive-sync-worker
    app.kubernetes.io/part-of: chessverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdrive-sync-worker
  template:
    metadata:
      labels:
        app: gdrive-sync-worker
        app.kubernetes.io/name: gdrive-sync-worker
    spec:
      imagePullSecrets:
        - name: harbor-pull
      volumes:
        - name: drives-config
          configMap:
            name: gdrive-sync-drives
        - name: drive-sa
          secret:
            secretName: gdrive-sync-drive-sa
      containers:
        - name: worker
          image: registry.multiagent.vision/chessverse/gdrive_sync:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - -Q
            - sync,upload
            - -l
            - info
            - -c
            - "8"
          env:
            - name: DRIVES_CONFIG_PATH
              value: /config/drives.yaml
            - name: MINIO_BUCKET
              value: chess-ai
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: gdrive-sync-minio-credentials
            - secretRef:
                name: gdrive-sync-env
          volumeMounts:
            - name: drives-config
              mountPath: /config
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/rehovot-drive-sa.json
              subPath: rehovot-drive-sa.json
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/beer-sheva-drive-sa.json
              subPath: beer-sheva-drive-sa.json
              readOnly: true
            - name: drive-sa
              mountPath: /secrets/ramat-gan-drive-sa.json
              subPath: ramat-gan-drive-sa.json
              readOnly: true
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chessverse-gdrive-sync-beat
  namespace: chessverse
  labels:
    app: gdrive-sync-beat
    app.kubernetes.io/name: gdrive-sync-beat
    app.kubernetes.io/part-of: chessverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdrive-sync-beat
  template:
    metadata:
      labels:
        app: gdrive-sync-beat
        app.kubernetes.io/name: gdrive-sync-beat
    spec:
      imagePullSecrets:
        - name: harbor-pull
      containers:
        - name: beat
          image: registry.multiagent.vision/chessverse/gdrive_sync:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app
            - beat
            - -l
            - info
            - --schedule=/tmp/celerybeat-schedule
          env:
            - name: DRIVES_CONFIG_PATH
              value: /config/drives.yaml
            - name: MINIO_BUCKET
              value: chess-ai
            - name: LOG_LEVEL
              value: "INFO"
          envFrom:
            - secretRef:
                name: gdrive-sync-minio-credentials
            - secretRef:
                name: gdrive-sync-env
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
