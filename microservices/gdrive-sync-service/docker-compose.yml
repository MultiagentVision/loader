services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gdrive
      POSTGRES_PASSWORD: gdrive
      POSTGRES_DB: gdrive_sync
    ports:
      - "5432:5432"
    volumes:
      - gdrive_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gdrive_minio:/data

  gdrive-sync-api:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./config:/config:ro
      - ./secrets:/secrets:ro

  gdrive-sync-worker:
    build: .
    command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "sync,upload", "-l", "info"]
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./config:/config:ro
      - ./secrets:/secrets:ro

  gdrive-sync-beat:
    build: .
    command: ["celery", "-A", "app.workers.celery_app", "beat", "-l", "info"]
    env_file:
      - .env
    depends_on:
      - redis

volumes:
  gdrive_pg:
  gdrive_minio:
