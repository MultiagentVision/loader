# Скопируйте в gitops-репозиторий или: kubectl apply -f thisfile.yaml
# Не кладите в microservices/gdrive-sync-service/k8s/ — Argo синхронизирует весь каталог k8s/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chessverse-gdrive-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MultiagentVision/chessverse-monorepo.git
    targetRevision: main
    path: microservices/gdrive-sync-service/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: chessverse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
